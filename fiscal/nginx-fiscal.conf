# ============================================================
# FRAGMENTO Nginx para o Módulo Fiscal
# Mesclar manualmente nos blocos `server` apropriados de
# /mnt/c/meus_projetos/capul-platform/nginx/nginx.conf
# ============================================================

# Backend (API REST do Módulo Fiscal)
location /api/v1/fiscal/ {
    proxy_pass http://fiscal-backend:3002/api/v1/fiscal/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    client_max_body_size 20M;  # XMLs autorizados podem chegar a alguns MB
}

# Frontend (Etapas 12-15 da Onda 1 — implementadas)
location /fiscal/ {
    proxy_pass http://fiscal-frontend:5176/fiscal/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

upstream hub {
    server hub:5170;
}

upstream auth_gateway {
    server auth-gateway:3000;
}

upstream gestao_ti_frontend {
    server gestao-ti-frontend:5173;
}

upstream gestao_ti_backend {
    server gestao-ti-backend:3001;
}

upstream inventario_backend {
    server inventario-backend:8000;
}

upstream inventario_frontend {
    server inventario-frontend:5174;
}

upstream configurador_frontend {
    server configurador:5175;
}

upstream fiscal_backend {
    server fiscal-backend:3002;
}

upstream fiscal_frontend {
    server fiscal-frontend:5176;
}

# ============================================================================
# Rate limiting zones (Plataforma Capul — protecao contra brute force/DDoS)
# ----------------------------------------------------------------------------
# auth_limit: 5 req/s por IP com burst de 10 — protege /auth/login e mudanca
#             de senha contra brute force (10 tentativas/seg por IP = muito
#             alem do que um humano faz, mas suficiente para UX normal).
# api_limit:  30 req/s por IP com burst de 50 — protege endpoints em geral
#             contra scraping agressivo sem impactar navegacao normal do usuario.
# conn_limit: maximo de 20 conexoes simultaneas por IP — previne exhaustion.
# ============================================================================
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Resposta amigavel ao exceder limite
limit_req_status 429;
limit_conn_status 429;

server {
    listen 80;
    server_name platform.capul.com.br localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name platform.capul.com.br localhost;

    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling — reduz latência TLS e aumenta privacidade do cliente
    # (cliente não precisa consultar CA diretamente)
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s ipv6=off;
    resolver_timeout 5s;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    # X-XSS-Protection removido — header obsoleto, ignorado por navegadores modernos
    # (Chromium/Firefox descontinuaram em 2019). CSP cobre o caso de uso. Auditoria 25/04 #14.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Auditoria 25/04/2026 #12 — `'unsafe-inline'` removido de `style-src`.
    # Vite extrai CSS para arquivo separado; sem `<style>` inline no HTML compilado.
    # `element.style.X = ...` em JS NÃO requer `unsafe-inline` (controle CSP só
    # afeta HTML/style attribute inicial).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # Ocultar versao do servidor
    server_tokens off;

    client_max_body_size 50M;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Limite de conexoes simultaneas por IP (aplicado globalmente neste server)
    limit_conn conn_limit 20;

    # =======================================
    # Auth Gateway API
    # =======================================
    # Rate limit RIGOROSO para endpoints de autenticacao (brute force protection).
    # 5 req/s burst 10, com "nodelay" (rejeita imediatamente ao exceder em vez
    # de enfileirar — melhor para brute force).
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://auth_gateway;
    }

    location /api/v1/core/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://auth_gateway;
    }

    # Rotas internas bloqueadas para acesso externo
    location /api/v1/internal/ {
        deny all;
        return 403;
    }

    # =======================================
    # Gestao de T.I.
    # =======================================
    location /gestao-ti/ {
        proxy_pass http://gestao_ti_frontend/;
    }

    location /api/v1/gestao-ti/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://gestao_ti_backend;
    }

    # =======================================
    # Configurador
    # =======================================
    location /configurador/ {
        proxy_pass http://configurador_frontend/;
    }

    # =======================================
    # Inventario (FastAPI backend + React frontend)
    # =======================================
    location /inventario/ {
        proxy_pass http://inventario_frontend/;
    }

    location /api/v1/inventory/ {
        proxy_pass http://inventario_backend/api/v1/inventory/;
    }

    location /api/v1/inventories/ {
        proxy_pass http://inventario_backend/api/v1/inventories/;
    }

    location /api/v1/import-produtos {
        proxy_pass http://inventario_backend/api/v1/import-produtos;
        proxy_read_timeout 1800s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
    }

    location /api/v1/sync/ {
        proxy_pass http://inventario_backend/api/v1/sync/;
        proxy_read_timeout 300s;
    }

    location /api/v1/integration/ {
        proxy_pass http://inventario_backend/api/v1/integration/;
    }

    location /api/v1/import/ {
        proxy_pass http://inventario_backend/api/v1/import/;
    }

    location /api/v1/products/ {
        proxy_pass http://inventario_backend/api/v1/products/;
    }

    location /api/v1/warehouses/ {
        proxy_pass http://inventario_backend/api/v1/warehouses/;
    }

    location /api/v1/assignments/ {
        proxy_pass http://inventario_backend/api/v1/assignments/;
    }

    location /api/v1/cycles/ {
        proxy_pass http://inventario_backend/api/v1/cycles/;
    }

    location /api/v1/lot-draft/ {
        proxy_pass http://inventario_backend/api/v1/lot-draft/;
    }

    location /api/v1/validation/ {
        proxy_pass http://inventario_backend/api/v1/validation/;
    }

    location /api/v1/monitoring/ {
        proxy_pass http://inventario_backend/api/v1/monitoring/;
    }

    location /api/v1/discrepancies/ {
        proxy_pass http://inventario_backend/api/v1/discrepancies/;
    }

    location = /api/v1/discrepancies {
        proxy_pass http://inventario_backend/api/v1/discrepancies;
    }

    location /api/v1/my-closed-rounds-simple {
        proxy_pass http://inventario_backend/api/v1/my-closed-rounds-simple;
    }

    location /api/v1/counting-lists/ {
        proxy_pass http://inventario_backend/api/v1/counting-lists/;
    }

    location /api/v1/counting/ {
        proxy_pass http://inventario_backend/api/v1/counting/;
    }

    location /api/v1/dashboard/ {
        proxy_pass http://inventario_backend/api/v1/dashboard/;
    }

    location /api/v1/reports/ {
        proxy_pass http://inventario_backend/api/v1/reports/;
    }

    # =======================================
    # Modulo Fiscal
    # =======================================
    location /fiscal/ {
        proxy_pass http://fiscal_frontend/fiscal/;
    }

    location /api/v1/fiscal/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://fiscal_backend;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        client_max_body_size 20M;
    }

    # =======================================
    # Hub (rota padrao — ultima)
    # =======================================
    location / {
        proxy_pass http://hub;
    }
}

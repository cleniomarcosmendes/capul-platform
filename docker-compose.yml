# Rotação de logs aplicada a todos os serviços — auditoria 26/04/2026 #1
# (Observabilidade). Sem isso, /var/lib/docker/containers/*/-json.log cresce
# indefinidamente até encher o disco. Com 50m × 5 arquivos: ~250MB max por
# container, ~3.25GB total para os 13 serviços.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"
    compress: "true"

services:
  # =======================================
  # REVERSE PROXY
  # =======================================
  nginx:
    image: nginx:alpine
    container_name: capul-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - hub
      - auth-gateway
      - configurador
      - gestao-ti-frontend
      - inventario-frontend
      - fiscal-frontend
    restart: unless-stopped
    logging: *default-logging
    # Limites de recursos — auditoria 25/04/2026 #5 (proxy reverso, todo tráfego passa)
    mem_limit: 128m
    mem_reservation: 32m
    cpus: 0.5
    # Healthcheck — auditoria 25/04/2026 #6
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://127.0.0.1/api/v1/auth/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # =======================================
  # INFRAESTRUTURA
  # =======================================
  postgres:
    image: postgres:16-alpine
    container_name: capul-db
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER obrigatorio no .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD obrigatorio no .env}
      POSTGRES_DB: capul_platform
    # Porta NAO exposta externamente — acesso apenas via rede Docker interna
    # Para acesso local de manutencao: docker compose exec postgres psql -U ${DB_USER} capul_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-schemas.sql:/docker-entrypoint-initdb.d/01-schemas.sql
      - ./inventario/database:/migrations-inv:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    # Limites de recursos — auditoria 25/04/2026 #5 (DB pode crescer com queries pesadas)
    mem_limit: 2g
    mem_reservation: 256m
    cpus: 1.0

  redis:
    image: redis:7-alpine
    container_name: capul-redis
    # Se REDIS_PASSWORD estiver ausente/vazio, o Compose aborta com erro
    # (sintaxe ${VAR:?}). Evita repetir o incidente 19/04/2026 onde Redis
    # subiu sem autenticacao porque a var nao estava preenchida em prod.
    command: redis-server --requirepass ${REDIS_PASSWORD:?Variavel REDIS_PASSWORD obrigatoria no .env — sem isto Redis rodaria sem autenticacao}
    # Porta NAO exposta externamente — acesso apenas via rede Docker interna
    volumes:
      - redis_data:/data
    restart: unless-stopped
    logging: *default-logging
    # Limites de recursos — auditoria 25/04/2026 #5
    mem_limit: 256m
    mem_reservation: 32m
    cpus: 0.25
    # Healthcheck — auditoria 25/04/2026 #6
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # =======================================
  # CORE — Auth Gateway + Portal Hub
  # =======================================
  auth-gateway:
    build: ./auth-gateway
    container_name: capul-auth
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/capul_platform?schema=core
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET obrigatorio no .env (64+ chars — gerar com openssl rand -hex 64)}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET obrigatorio (deve ser diferente de JWT_SECRET)}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-60m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS:-https://localhost}
    # Porta NAO exposta — acesso via Nginx reverse proxy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging
    # Limites de recursos — auditoria 25/04/2026 #5 (NestJS + Prisma + bcrypt)
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 0.5
    # Healthcheck — auditoria 25/04/2026 #6
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/v1/auth/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  hub:
    build: ./hub
    container_name: capul-hub
    # Porta NAO exposta — acesso via Nginx reverse proxy
    depends_on:
      - auth-gateway
    restart: unless-stopped
    logging: *default-logging
    # Limites de recursos — auditoria 25/04/2026 #5 (frontend nginx static)
    mem_limit: 128m
    mem_reservation: 32m
    cpus: 0.25
    # Healthcheck — auditoria 25/04/2026 #6
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5170/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  configurador:
    build: ./configurador
    container_name: capul-configurador
    # Porta NAO exposta — acesso via Nginx reverse proxy
    depends_on:
      - auth-gateway
    restart: unless-stopped
    logging: *default-logging
    # Limites de recursos — auditoria 25/04/2026 #5 (frontend nginx static)
    mem_limit: 128m
    mem_reservation: 32m
    cpus: 0.25
    # Healthcheck — auditoria 25/04/2026 #6
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5175/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # =======================================
  # MODULO — Inventario
  # =======================================
  inventario-backend:
    build: ./inventario/backend
    container_name: capul-inventario-api
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/capul_platform
      JWT_SECRET: ${JWT_SECRET}
      DB_SCHEMA: inventario
      CORE_SCHEMA: core
      UNIFIED_AUTH: "true"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CORS_ORIGINS: "https://platform.capul.com.br,https://localhost,https://172.16.0.159"
      ENVIRONMENT: production
      DEBUG: "false"
      PROTHEUS_API_URL: ${PROTHEUS_API_URL:-https://apiportal.capul.com.br:8104/rest/api/INFOCLIENTES/hierarquiaMercadologica}
      PROTHEUS_API_AUTH: ${PROTHEUS_API_AUTH:-Basic QVBJQ0FQVUw6QXAxQzRwdTFQUkQ=}
      PROTHEUS_API_TIMEOUT: ${PROTHEUS_API_TIMEOUT:-30}
      PROTHEUS_INVENTARIO_URL: ${PROTHEUS_INVENTARIO_URL:-https://apiportal.capul.com.br:8104/rest/api/INFOCLIENTES}
      PROTHEUS_INVENTARIO_AUTH: ${PROTHEUS_INVENTARIO_AUTH:-Basic QVBJQ0FQVUw6QXAxQzRwdTFQUkQ=}
      PROTHEUS_INVENTARIO_TIMEOUT: ${PROTHEUS_INVENTARIO_TIMEOUT:-60}
      PROTHEUS_INVENTARIO_VERIFY_SSL: ${PROTHEUS_INVENTARIO_VERIFY_SSL:-false}
    # Porta NAO exposta — acesso via Nginx reverse proxy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging
    # Limites de recursos — auditoria 25/04/2026 #5 (FastAPI + sync Protheus)
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 0.5

  inventario-frontend:
    build: ./inventario/frontend
    container_name: capul-inventario-web
    # Porta NAO exposta — acesso via Nginx reverse proxy
    depends_on:
      - inventario-backend
    restart: unless-stopped
    logging: *default-logging
    # Limites de recursos — auditoria 25/04/2026 #5 (frontend nginx static)
    mem_limit: 128m
    mem_reservation: 32m
    cpus: 0.25
    # Healthcheck — auditoria 25/04/2026 #6
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5174/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # =======================================
  # MODULO — Gestao de T.I.
  # =======================================
  gestao-ti-backend:
    build: ./gestao-ti/backend
    container_name: capul-gestao-ti-api
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/capul_platform?schema=public
      JWT_SECRET: ${JWT_SECRET}
      DB_SCHEMA: gestao_ti
      CORE_SCHEMA: core
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS:-https://localhost}
    # Porta NAO exposta — acesso via Nginx reverse proxy
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging
    # Limites de recursos — auditoria 25/04/2026 #5 (NestJS + Prisma + uploads)
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 0.5
    # Healthcheck — auditoria 25/04/2026 #6
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/v1/gestao-ti/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  gestao-ti-frontend:
    build: ./gestao-ti/frontend
    container_name: capul-gestao-ti-web
    # Porta NAO exposta — acesso via Nginx reverse proxy
    depends_on:
      - gestao-ti-backend
    restart: unless-stopped
    logging: *default-logging
    # Limites de recursos — auditoria 25/04/2026 #5 (frontend nginx static)
    mem_limit: 128m
    mem_reservation: 32m
    cpus: 0.25
    # Healthcheck — auditoria 25/04/2026 #6
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5173/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # =======================================
  # MODULO — Fiscal
  # =======================================
  fiscal-backend:
    build: ./fiscal/backend
    container_name: capul-fiscal-api
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/capul_platform?schema=public
      JWT_SECRET: ${JWT_SECRET}
      DB_SCHEMA: fiscal
      CORE_SCHEMA: core
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
      PORT: 3002
      CORS_ORIGINS: ${CORS_ORIGINS:-https://localhost}
      FISCAL_NFE_CERT_PATH: ${FISCAL_NFE_CERT_PATH:-/app/certs/certificado-fiscal.pfx}
      # Variaveis OBRIGATORIAS — Compose aborta se ausentes/vazias.
      # Evita repetir o incidente 19/04/2026 (subir com vars vazias e rodar
      # em modo degradado silencioso sem erro aparente).
      FISCAL_MASTER_KEY: ${FISCAL_MASTER_KEY:?FISCAL_MASTER_KEY obrigatoria no .env (senha do certificado A1 depende dela)}
      FISCAL_SEFAZ_AMBIENTE: ${FISCAL_SEFAZ_AMBIENTE:-HOMOLOGACAO}
      FISCAL_PAUSE_SYNC: ${FISCAL_PAUSE_SYNC:-false}
      FISCAL_CNPJ_CONSULENTE: ${FISCAL_CNPJ_CONSULENTE:?FISCAL_CNPJ_CONSULENTE obrigatoria (CNPJ consulente SEFAZ)}
      PROTHEUS_API_URL: ${PROTHEUS_API_URL:?PROTHEUS_API_URL obrigatoria no .env (consultas cadastrais dependem dela)}
      PROTHEUS_API_AUTH: ${PROTHEUS_API_AUTH:?PROTHEUS_API_AUTH obrigatoria no .env (sem isto Fiscal nao autentica no Protheus)}
      FISCAL_PROTHEUS_MOCK: ${FISCAL_PROTHEUS_MOCK:-true}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-fiscal@capul.com.br}
      FISCAL_FALLBACK_EMAIL: ${FISCAL_FALLBACK_EMAIL:-ti@capul.com.br}
      FISCAL_STORAGE: /app/xmls
    # Porta NAO exposta — acesso via Nginx reverse proxy
    volumes:
      - ./fiscal/backend/certs:/app/certs
      - fiscal_xmls:/app/xmls
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging
    # Limites de recursos — auditoria 25/04/2026 #5 (NestJS + BullMQ + parsers XML)
    mem_limit: 768m
    mem_reservation: 128m
    cpus: 0.75

  fiscal-frontend:
    build: ./fiscal/frontend
    container_name: capul-fiscal-web
    # Porta NAO exposta — acesso via Nginx reverse proxy
    depends_on:
      - fiscal-backend
    restart: unless-stopped
    logging: *default-logging
    # Limites de recursos — auditoria 25/04/2026 #5 (frontend nginx static)
    mem_limit: 128m
    mem_reservation: 32m
    cpus: 0.25
    # Healthcheck — auditoria 25/04/2026 #6
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5176/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # =======================================
  # FERRAMENTAS
  # =======================================
  pgadmin:
    image: dpage/pgadmin4
    container_name: capul-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "127.0.0.1:5050:80"  # Apenas acesso local (localhost do servidor)
    depends_on:
      - postgres
    logging: *default-logging
    # Limites de recursos — auditoria 25/04/2026 #5 (uso intermitente administrativo)
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.25
    # Healthcheck — auditoria 25/04/2026 #6 (pgAdmin expõe /misc/ping)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/misc/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  fiscal_xmls:

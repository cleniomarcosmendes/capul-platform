<!-- =================================
     MODAL DE SELEÇÃO DE FILIAL v2.12.0
     ================================= -->
<div class="modal fade" id="storeSelectionModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 15px; overflow: hidden;">
            <div class="modal-header text-white" style="background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));">
                <h5 class="modal-title">
                    <i class="bi bi-shop me-2"></i> Selecione a Filial
                </h5>
            </div>
            <div class="modal-body" style="padding: 30px;">
                <p class="text-muted mb-3" style="font-size: 1.05rem;">
                    <i class="bi bi-person-circle me-1"></i>
                    <strong id="storeModalUsername"></strong>, selecione qual filial deseja acessar:
                </p>

                <div id="storesListLogin" class="list-group" style="max-height: 400px; overflow-y: auto;">
                    <!-- Lojas carregadas dinamicamente -->
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="cancelStoreSelection()">
                    <i class="bi bi-x-circle me-1"></i> Cancelar
                </button>
            </div>
        </div>
    </div>
</div>

<style>
/* Estilos para lista de lojas no modal */
#storesListLogin .list-group-item {
    border-radius: 10px;
    margin-bottom: 10px;
    border: 2px solid #e2e8f0;
    transition: all 0.3s;
    cursor: pointer;
}

#storesListLogin .list-group-item:hover {
    border-color: var(--primary-color);
    background-color: #f8fafc;
    transform: translateX(5px);
}

#storesListLogin .list-group-item:active {
    transform: translateX(3px);
}

#storesListLogin .badge {
    font-size: 0.85rem;
    padding: 5px 10px;
}
</style>

<script>
// =================================
// VARIÁVEIS GLOBAIS v2.12.0
// =================================

let tempUserData = null;  // Armazena dados temporários do usuário após validar credenciais

// =================================
// NOVO FLUXO DE LOGIN (2 ETAPAS) v2.12.0
// =================================

/**
 * Função principal de login - MODIFICADA para fluxo em 2 etapas
 * Etapa 1: Validar credenciais
 * Etapa 2: Selecionar filial (se aplicável)
 */
async function handleLoginMultifilial(event) {
    event.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const loginBtn = document.getElementById('loginBtn');

    // Validações básicas
    if (!username || !password) {
        showAlert('Por favor, preencha usuário e senha', 'warning');
        return;
    }

    if (username.length < 3) {
        showAlert('Usuário deve ter pelo menos 3 caracteres', 'warning');
        return;
    }

    if (password.length < 6) {
        showAlert('Senha deve ter pelo menos 6 caracteres', 'warning');
        return;
    }

    // Mostrar loading
    loginBtn.disabled = true;
    loginBtn.classList.add('btn-loading');
    clearAlerts();

    try {
        // ETAPA 1: Validar credenciais
        const response = await fetch(`${API_BASE_URL}/api/v1/auth/validate-credentials`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) {
            showAlert(data.detail || 'Credenciais inválidas', 'danger');
            return;
        }

        // Armazenar dados temporários
        tempUserData = data;

        console.log('✅ Credenciais validadas:', data);

        // Se usuário é ADMIN ou tem apenas 1 loja, pular seleção
        if (data.role === 'ADMIN' || data.stores.length === 1) {
            const storeId = data.stores.length === 1 ? data.stores[0].id : null;
            console.log(`ℹ️ Login direto: ${data.role === 'ADMIN' ? 'ADMIN' : '1 loja apenas'}`);
            await completeLogin(data.user_id, storeId);
        } else if (data.stores.length === 0) {
            // Usuário sem lojas atribuídas
            showAlert('Usuário não tem lojas atribuídas. Contate o administrador.', 'warning');
        } else {
            // ETAPA 2: Mostrar modal de seleção de filial
            console.log(`ℹ️ Usuário tem ${data.stores.length} lojas - abrindo modal de seleção`);
            showStoreSelectionModal(data);
        }

    } catch (error) {
        console.error('💥 Erro no login:', error);
        showAlert('Erro de conexão com o servidor', 'danger');
    } finally {
        // Remover loading
        setTimeout(() => {
            loginBtn.disabled = false;
            loginBtn.classList.remove('btn-loading');
        }, 1000);
    }
}

/**
 * Exibe modal de seleção de filial
 */
function showStoreSelectionModal(userData) {
    // Preencher nome do usuário
    document.getElementById('storeModalUsername').textContent = userData.full_name;

    // Preencher lista de lojas
    const storesList = document.getElementById('storesListLogin');
    storesList.innerHTML = '';

    // Ordenar: lojas padrão primeiro
    const sortedStores = userData.stores.sort((a, b) => {
        if (a.is_default && !b.is_default) return -1;
        if (!a.is_default && b.is_default) return 1;
        return a.name.localeCompare(b.name);
    });

    sortedStores.forEach(store => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'list-group-item list-group-item-action';
        button.dataset.storeId = store.id;
        button.dataset.storeCode = store.code;
        button.dataset.storeName = store.name;

        button.innerHTML = `
            <div class="d-flex w-100 justify-content-between align-items-center">
                <div>
                    <h6 class="mb-1" style="font-size: 1.1rem;">
                        <i class="bi bi-shop text-primary me-2"></i>
                        <strong>[${store.code}]</strong> ${store.name}
                    </h6>
                </div>
                ${store.is_default ? '<span class="badge bg-success"><i class="bi bi-star-fill me-1"></i>Padrão</span>' : ''}
            </div>
        `;

        button.onclick = () => selectStore(store.id);
        storesList.appendChild(button);
    });

    // Abrir modal
    const modal = new bootstrap.Modal(document.getElementById('storeSelectionModal'));
    modal.show();
}

/**
 * Seleciona loja e completa o login
 */
async function selectStore(storeId) {
    try {
        console.log(`ℹ️ Loja selecionada: ${storeId}`);

        await completeLogin(tempUserData.user_id, storeId);

        // Fechar modal
        const modal = bootstrap.Modal.getInstance(document.getElementById('storeSelectionModal'));
        if (modal) {
            modal.hide();
        }

    } catch (error) {
        console.error('💥 Erro ao selecionar loja:', error);
        showAlert('Erro ao selecionar loja', 'danger');
    }
}

/**
 * Completa o login gerando token com loja selecionada
 */
async function completeLogin(userId, storeId) {
    console.log(`ℹ️ Completando login: userId=${userId}, storeId=${storeId || 'N/A'}`);

    // ETAPA 2: Gerar token com loja selecionada
    const response = await fetch(`${API_BASE_URL}/api/v1/auth/login-with-store`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: userId, store_id: storeId })
    });

    const data = await response.json();

    if (!response.ok) {
        throw new Error(data.detail || 'Erro ao completar login');
    }

    console.log('✅ Login completo:', data);

    // Salvar token e dados no localStorage
    localStorage.setItem('access_token', data.access_token);
    localStorage.setItem('token_type', data.token_type);
    localStorage.setItem('login_time', Date.now().toString());
    localStorage.setItem('auth_mode', 'api');
    localStorage.setItem('user_data', JSON.stringify(data.user));
    localStorage.setItem('user_name', data.user.full_name);
    localStorage.setItem('user_role', data.user.role);
    localStorage.setItem('store_id', storeId || '');  // ✅ Store da SESSÃO
    localStorage.setItem('store_name', data.store?.name || '');
    localStorage.setItem('store_code', data.store?.code || '');

    showAlert('Login realizado com sucesso!', 'success', 2000);

    // Redirecionar baseado no role
    setTimeout(() => {
        if (data.user.role === 'OPERATOR') {
            window.location.href = 'counting_improved.html';
        } else {
            window.location.href = 'dashboard.html';
        }
    }, 1500);
}

/**
 * Cancela seleção de loja e volta para tela de login
 */
function cancelStoreSelection() {
    tempUserData = null;
    const modal = bootstrap.Modal.getInstance(document.getElementById('storeSelectionModal'));
    if (modal) {
        modal.hide();
    }
    showAlert('Login cancelado', 'info');
}

// =================================
// SOBRESCREVER handleLogin ORIGINAL
// =================================

// Substituir função de login antiga pela nova
const originalHandleLogin = window.handleLogin;
window.handleLogin = handleLoginMultifilial;

console.log('✅ Sistema Multi-Filial v2.12.0 carregado!');
console.log('ℹ️ Fluxo de login em 2 etapas ativado');
</script>

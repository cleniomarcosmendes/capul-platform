    <style>
        /* ✅ v2.19.40: Layout 100% para aproveitamento total da tela */
        .container {
            max-width: 100% !important;
        }

        :root {
            --primary-color: #1B5E20;
            --secondary-color: #858796;
            --success-color: #1cc88a;
            --warning-color: #f6c23e;
        }

        body {
            background-color: #f8f9fc;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 100%);
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
        }

        /* Page Header (Padrão do Sistema) */
        .page-header {
            background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 100%);
            color: white;
            padding: 2rem;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
        }

        .page-header h4 {
            font-weight: 700;
            margin: 0;
        }

        .page-header .btn-light {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
        }

        .page-header .btn-light:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .page-header .btn-outline-light:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Info Cards (Padrão do Sistema) */
        .info-cards {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.05) 100%);
            padding: 1.5rem 2rem;
        }

        .info-card {
            background: white;
            border-radius: 0.5rem;
            padding: 1rem;
            box-shadow: 0 0.125rem 0.5rem rgba(0, 0, 0, 0.075);
            display: flex;
            align-items: center;
            gap: 1rem;
            height: 100%;
        }

        .info-card-icon {
            font-size: 2rem;
            color: var(--primary-color);
            opacity: 0.8;
        }

        .info-card-content small {
            display: block;
            font-size: 0.75rem;
            color: var(--secondary-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
        }

        .info-card-content strong {
            display: block;
            font-size: 1.1rem;
            color: #2c3e50;
        }

        /* Tabela */
        .table-container {
            background: white;
            margin: 1rem 2rem;
            border-radius: 0.5rem;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
            overflow: auto;
            max-height: calc(100vh - 290px); /* Altura máxima para scroll quando necessário */
        }

        .table {
            margin-bottom: 0;
            font-size: 0.9rem;
        }

        .table thead th {
            background-color: #f8f9fc;
            border-bottom: 2px solid #e3e6f0;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            padding: 0.75rem 0.5rem;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .table tbody td {
            padding: 0.75rem 0.5rem;
            vertical-align: middle;
        }

        .table tbody tr:hover {
            background-color: #f8f9fc;
        }

        /* Alert Footer */
        .alert-footer {
            margin: 0.5rem 2rem 2rem 2rem;
        }

        /* Badges */
        .badge-inventory {
            font-size: 0.85rem;
            padding: 0.5rem 1rem;
        }

        /* Print styles */
        @media print {
            @page {
                size: landscape; /* Orientação paisagem */
                margin: 10mm; /* Margens menores */
            }

            .navbar,
            .page-header .btn,
            .export-section,
            .alert-footer {
                display: none !important;
            }

            .page-header {
                padding: 0.5rem;
                font-size: 0.9rem;
            }

            .page-header h4 {
                font-size: 1.2rem;
            }

            .info-cards {
                padding: 0.5rem;
                font-size: 0.75rem;
            }

            .info-card {
                padding: 0.5rem;
            }

            .info-card-icon {
                font-size: 1.2rem;
            }

            .info-card-content strong {
                font-size: 0.9rem;
            }

            .table-container {
                margin: 0.5rem;
                box-shadow: none;
                max-height: none;
                overflow: visible;
            }

            .table {
                font-size: 0.7rem; /* Fonte menor para tabela */
                page-break-inside: auto;
            }

            .table thead th {
                padding: 3px 2px;
                font-size: 0.65rem;
            }

            .table tbody td {
                padding: 3px 2px;
                font-size: 0.7rem;
            }

            .table tr {
                page-break-inside: avoid;
                page-break-after: auto;
            }

            .table thead {
                display: table-header-group; /* Repetir header em cada página */
            }

            body {
                background: white;
                print-color-adjust: exact;
                -webkit-print-color-adjust: exact;
            }

            /* Garantir que cores sejam impressas */
            .row-synthetic,
            .row-analytical,
            .badge {
                print-color-adjust: exact;
                -webkit-print-color-adjust: exact;
            }
        }

        /* ✅ v2.15.2: Classes para diferenciar linhas agregadas vs analíticas */
        .row-synthetic {
            background-color: #fff3cd !important; /* Amarelo claro */
            font-weight: 500;
        }

        .row-analytical {
            background-color: #d1e7dd !important; /* Verde claro */
        }

        .row-synthetic td:first-child,
        .row-analytical td:first-child {
            border-left: 4px solid #ffc107 !important;
        }

        .row-analytical td:first-child {
            border-left: 4px solid #198754 !important;
        }
    </style>

    <!-- ✅ v2.17.4: Utilitários globais (sessão, loading, erros) -->
    <script src="/js/global_utils.js"></script>
</head>
<body>

        <div class="container-fluid px-4">
            <div class="row align-items-center">

        <div class="container-fluid">

                <div>
                    <h4 class="mb-1" id="page-main-title">
                        <i class="bi bi-arrow-left-right"></i> Análise Comparativa de Inventários

    <!-- Cards Informativos (Padrão do Sistema) -->
    <div class="info-cards">

            <div class="row g-3">

                    <div class="info-card">
                        <div class="info-card-icon">

    <!-- Tabela de Resultados -->
    <div class="table-container" id="table-container">
        <div class="mb-3" id="comparisonSearchContainer" style="display: none; padding: 0 1rem;">
            <div style="position: relative; display: inline-block;">
                <input type="text" id="comparisonSearchInput" placeholder="Buscar por codigo ou descricao..."
                       class="form-control" style="width: 300px; padding-left: 35px;">

    <!-- Seção de Ações -->
    <div class="export-section" style="margin: 2rem; padding: 1.5rem; background: white; border-radius: 0.5rem; box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);">

    <!-- Alert Informativo -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS Consolidados v2.19.13 -->
    <script src="/js/security.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/export.js"></script>

    <script>
        const API_BASE_URL = window.location.origin + '/api';
        let comparisonData = null;

        // ✅ v2.19.32: Inicializar header Capul
        function initCapulHeader() {
            const userData = JSON.parse(localStorage.getItem('user_data') || '{}');
            const storeName = localStorage.getItem('store_name') || userData.store_name || 'Loja';
            const storeCode = localStorage.getItem('store_code') || userData.store_code || '';

            const storeEl = document.getElementById('headerStoreName');
            if (storeEl) {
                storeEl.textContent = storeCode ? `${storeCode} - ${storeName}` : storeName;
            }

            const userName = userData.username || userData.name || 'Usuário';
            const userRole = userData.role || 'USER';

            const userNameEl = document.getElementById('headerUserName');
            const userAvatarEl = document.getElementById('userAvatar');
            const userRoleEl = document.getElementById('userRoleBadge');

            if (userNameEl) userNameEl.textContent = userName;
            if (userAvatarEl) userAvatarEl.textContent = userName.charAt(0).toUpperCase();
            if (userRoleEl) {
                const roleSpan = userRoleEl.querySelector('span');
                if (roleSpan) roleSpan.textContent = userRole;
            }
        }

        function logout() {
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = '/static/login.html';
        }

        // Inicializar header ao carregar
        initCapulHeader();

        // ✅ v2.15.1: Função auxiliar para formatar badge de rastreamento
        function formatTrackingBadge(tracking) {
            if (!tracking || tracking === 'N/A' || tracking === '') {
                return '<span class="badge" style="background-color: #6c757d; color: white; font-size: 0.75rem;">N/A</span>';
            } else if (tracking === 'L') {
                return '<span class="badge" style="background-color: #28a745; color: white; font-size: 0.75rem;">L</span>';
            } else if (tracking === 'S') {
                return '<span class="badge" style="background-color: #007bff; color: white; font-size: 0.75rem;">S</span>';
            } else {
                return `<span class="badge" style="background-color: #ffc107; color: black; font-size: 0.75rem;">${tracking}</span>`;
            }
        }

        // ✅ v2.15.1: Função auxiliar para formatar número do lote
        // ✅ v2.19.6: Concatenar com lote do fornecedor (B8_LOTEFOR)
        function formatLotNumber(lotNumber, lotSupplier = null) {
            if (!lotNumber) return '-';
            if (lotSupplier) {
                return `${lotNumber} | ${lotSupplier}`;
            }
            return lotNumber;
        }

        // ✅ Função para carregar dados (sessionStorage ou API)
        async function loadComparisonData() {
            try {
                // ✅ v2.18.1: Verificar se é página de transferências - sempre buscar API
                const urlParams = new URLSearchParams(window.location.search);
                const mode = urlParams.get('mode');

                // 1. Tentar recuperar do sessionStorage (EXCETO para transfers)
                const cachedData = sessionStorage.getItem('comparisonResults');
                if (cachedData && mode !== 'transfers') {
                    console.log('✅ Dados encontrados no sessionStorage');
                    comparisonData = JSON.parse(cachedData);
                    renderComparisonResults();
                    return;
                }

                // ✅ v2.18.1: Para transfers, SEMPRE buscar da API
                if (mode === 'transfers') {
                    console.log('🔄 Modo transfers: forçando busca da API...');
                    sessionStorage.removeItem('comparisonResults');
                }

                // 2. Se não tiver no cache, verificar parâmetros da URL
                const inventoryAId = urlParams.get('inventory_a_id');
                const inventoryBId = urlParams.get('inventory_b_id');

                console.log('🔄 Parâmetros da URL:', { inventoryAId, inventoryBId });

                if (!inventoryAId || !inventoryBId) {
                    throw new Error('Parâmetros inválidos na URL');
                }

                // 3. Fazer fetch da comparação
                console.log('🔄 Carregando dados da API...');
                const token = localStorage.getItem('access_token');

                const response = await fetch(
                    `${API_BASE_URL}/v1/inventory/compare?inventory_a_id=${inventoryAId}&inventory_b_id=${inventoryBId}`,
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        }
                    }
                );

                if (!response.ok) {
                    throw new Error(`Erro ao carregar comparação: ${response.statusText}`);
                }

                const apiData = await response.json();
                console.log('✅ Dados carregados da API');

                // 4. Montar estrutura esperada e salvar no sessionStorage
                // ✅ Se vindo da URL, usar 'cards' para mostrar os 4 cards, não os detalhes
                const showMode = urlParams.get('mode') || 'cards';  // 'cards' ou 'matches' ou 'manual' ou 'transfers'

                comparisonData = {
                    type: showMode,  // Usar modo da URL ou 'cards' por padrão
                    invA: apiData.inventory_a,
                    invB: apiData.inventory_b,
                    matches: apiData.matches || [],
                    manualReview: apiData.manual_review || [],
                    transfers: apiData.transfers || [],
                    summary: apiData.summary || {}
                };

                sessionStorage.setItem('comparisonResults', JSON.stringify(comparisonData));
                renderComparisonResults();

            } catch (error) {
                console.error('❌ Erro ao carregar dados:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'Erro',
                    text: error.message || 'Erro ao carregar dados de comparação!',
                    confirmButtonColor: '#667eea'
                }).then(() => {
                    window.location.href = 'inventory.html';
                });
            }
        }

        // Iniciar carregamento
        loadComparisonData();

        // Filtro de busca na tabela de comparacao
        document.getElementById('comparisonSearchInput')?.addEventListener('input', function() {
            const term = this.value.toLowerCase();
            const rows = document.querySelectorAll('#table-container table tbody tr');
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(term) ? '' : 'none';
            });
        });

        // ✅ v2.18.1: Função para forçar atualização de dados (ignorar cache)
        function forceReloadData() {
            console.log('🔄 Forçando atualização de dados...');

            // Limpar sessionStorage
            sessionStorage.removeItem('comparisonResults');

            // Obter parâmetros da URL
            const urlParams = new URLSearchParams(window.location.search);
            const inventoryAId = urlParams.get('inventory_a_id');
            const inventoryBId = urlParams.get('inventory_b_id');
            const mode = urlParams.get('mode') || 'transfers';

            if (!inventoryAId || !inventoryBId) {
                Swal.fire({
                    icon: 'error',
                    title: 'Erro',
                    text: 'Parâmetros da URL não encontrados!',
                    confirmButtonColor: '#667eea'
                });
                return;
            }

            // Recarregar página com parâmetros (vai buscar da API)
            window.location.href = `comparison_results.html?inventory_a_id=${inventoryAId}&inventory_b_id=${inventoryBId}&mode=${mode}`;
        }

        function renderComparisonResults() {
            const { type, invA, invB, matches, manualReview, transfers, summary } = comparisonData;
            const isMatches = type === 'matches';
            const isTransfers = type === 'transfers';
            const data = isTransfers ? transfers : (isMatches ? matches : manualReview);

            // Atualizar header principal
            if (isTransfers) {
                document.getElementById('page-main-title').innerHTML =
                    '<i class="bi bi-arrow-left-right"></i> Relatório de Transferências';
                document.getElementById('page-subtitle').textContent =
                    'Movimentações sugeridas entre armazéns';
            } else if (isMatches) {
                // ✅ v2.19.48: Título unificado para Transferências
                document.getElementById('page-main-title').innerHTML =
                    '<i class="bi bi-arrow-left-right"></i> Transferências - Ajuste Contábil';
                document.getElementById('page-subtitle').textContent =
                    'Produtos com divergências opostas que permitem transferência lógica entre armazéns';
            } else {
                document.getElementById('page-main-title').innerHTML =
                    '<i class="bi bi-exclamation-triangle-fill"></i> Análise Manual';
                document.getElementById('page-subtitle').textContent =
                    'Produtos que requerem decisão manual';
            }

            // Atualizar cards informativos
            document.getElementById('card-inv-a').textContent = `${invA.name} - Arm. ${invA.warehouse}`;
            document.getElementById('card-inv-b').textContent = `${invB.name} - Arm. ${invB.warehouse}`;
            document.getElementById('card-total').textContent = `${data.length} produto${data.length !== 1 ? 's' : ''}`;

            // Atualizar card TIPO
            const typeIcon = document.getElementById('card-type-icon');
            const typeText = document.getElementById('card-type');
            if (isTransfers) {
                typeIcon.innerHTML = '<i class="bi bi-arrow-left-right"></i>';
                typeIcon.style.color = '#4e73df';
                typeText.textContent = 'Transferências';
            } else if (isMatches) {
                // ✅ v2.19.48: Ícone e texto unificados para Transferências
                typeIcon.innerHTML = '<i class="bi bi-arrow-left-right"></i>';
                typeIcon.style.color = '#1cc88a';
                typeText.textContent = 'Transferências';
            } else {
                typeIcon.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i>';
                typeIcon.style.color = '#f6c23e';
                typeText.textContent = 'Análise Manual';
            }

            // Atualizar alert
            const alertDiv = document.getElementById('info-alert');
            if (isTransfers) {
                alertDiv.className = 'alert alert-primary d-flex align-items-center';
                alertDiv.innerHTML = `
                    <i class="bi bi-info-circle-fill me-2"></i>
                    <div>
                        <strong>Relatório de Transferências:</strong> Lista simplificada de movimentações sugeridas entre armazéns.
                    </div>
                `;
            } else if (isMatches) {
                // ✅ v2.19.48: Alert unificado para Transferências
                alertDiv.className = 'alert alert-success d-flex align-items-center';
                alertDiv.innerHTML = `
                    <i class="bi bi-arrow-left-right me-2"></i>
                    <div>
                        <strong>Transferências Lógicas:</strong> Ajustes contábeis entre armazéns. <strong>Sem movimentação física</strong> de produtos.
                        Inclui matches perfeitos (100%) e transferências parciais (com ajuste residual).
                    </div>
                `;
            } else {
                alertDiv.className = 'alert alert-warning d-flex align-items-center';
                alertDiv.innerHTML = `
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <div>
                        <strong>Atenção:</strong> Estes produtos requerem decisão manual sobre transferência ou ajuste.
                    </div>
                `;
            }

            // ✅ v2.18.0: Renderizar cards de resumo para análise manual
            if (type !== 'transfers' && type !== 'matches') {
                renderSummaryCards(data, invA, invB);
            }

            // Mostrar campo de busca
            const searchContainer = document.getElementById('comparisonSearchContainer');
            if (searchContainer) searchContainer.style.display = 'block';

            // Renderizar tabela
            renderTable(type, data, invA, invB);
        }

        function renderSummaryCards(data, invA, invB) {
            // ✅ v2.18.0: Cards de resumo por inventário mostrando impacto das transferências

        function exportToCSV() {
            const { type, invA, invB, matches, manualReview, transfers } = comparisonData;
            const isMatches = type === 'matches';
            const isTransfers = type === 'transfers';
            const data = isTransfers ? transfers : (isMatches ? matches : manualReview);

            let csv = '';

            // Cabeçalho baseado no tipo
            if (isTransfers) {
                // ✅ v2.19.49: CSV para Transferências com Qtde Contada
                csv = 'Código,Descrição,Lote,N° Lote,Armazém Origem,Saldo Origem Antes,Qtde Contada Origem,Saldo Origem Depois,Armazém Destino,Saldo Destino Antes,Qtde Contada Destino,Saldo Destino Depois,Qtd Transf. Lógica\n';
                data.forEach(item => {
                    const transf = item.transferencia_logica || {};
                    const sourceWarehouse = item.source_warehouse || item.transfer_from;
                    const sourceIsA = sourceWarehouse === invA.warehouse;

                    const saldoOrigemAntes = transf.saldo_origem_antes || (sourceIsA ? item.expected_a : item.expected_b) || 0;
                    const saldoOrigemDepois = transf.saldo_origem_depois || saldoOrigemAntes;
                    const saldoDestinoAntes = transf.saldo_destino_antes || (sourceIsA ? item.expected_b : item.expected_a) || 0;
                    const saldoDestinoDepois = transf.saldo_destino_depois || saldoDestinoAntes;
                    const countedOrigem = sourceIsA ? (item.counted_a || 0) : (item.counted_b || 0);
                    const countedDestino = sourceIsA ? (item.counted_b || 0) : (item.counted_a || 0);

                    csv += `"${item.product_code}","${item.description}","${item.tracking || 'N/A'}","${item.lot_number || '-'}","${sourceWarehouse}",${saldoOrigemAntes},${countedOrigem},${saldoOrigemDepois},"${item.target_warehouse || item.transfer_to}",${saldoDestinoAntes},${countedDestino},${saldoDestinoDepois},${parseFloat(item.quantity || item.transfer_qty || 0).toFixed(2)}\n`;
                });
            } else if (isMatches) {
                csv = 'Código,Descrição,Saldo Estoque + Ent.Post A,Qtd Contada A,Qtd Contada Ajusta A,Saldo Estoque + Ent.Post B,Qtd Contada B,Qtd Contada Ajusta B,Transferir de,Transferir para,Quantidade\n';
                data.forEach(item => {
                    // Calcular quantidade contada ajustada
                    const transferQty = Math.min(Math.abs(item.divergence_a || 0), Math.abs(item.divergence_b || 0));
                    const transferFromA = (item.divergence_a > 0 && item.divergence_b < 0) ? transferQty : 0;
                    const transferFromB = (item.divergence_b > 0 && item.divergence_a < 0) ? transferQty : 0;
                    const adjustedCountedA = (item.counted_a || 0) - transferFromA + transferFromB;
                    const adjustedCountedB = (item.counted_b || 0) - transferFromB + transferFromA;

                    csv += `"${item.product_code}","${item.description}",${item.expected_a},${item.counted_a},${adjustedCountedA},${item.expected_b},${item.counted_b},${adjustedCountedB},"${item.transfer_from}","${item.transfer_to}",${item.transfer_qty}\n`;
                });
            } else {
                // ✅ v2.18.0: CSV para Análise Manual com Transferência Lógica
                csv = 'Código,Descrição,Lote,N° Lote,Saldo A,Contado A,Diverg. A,Transf→B,Estoque Ajust. A,Dif. Final A,Saldo B,Contado B,Diverg. B,Transf←A,Estoque Ajust. B,Dif. Final B,Economia (R$)\n';
                data.forEach(item => {
                    const transf = item.transferencia_logica || {};
                    const saldoAjustadoA = item.saldo_ajustado_a !== undefined ? item.saldo_ajustado_a : item.expected_a;
                    const saldoAjustadoB = item.saldo_ajustado_b !== undefined ? item.saldo_ajustado_b : item.expected_b;
                    const difFinalA = item.diferenca_final_a !== undefined ? item.diferenca_final_a : (item.counted_a - item.expected_a);
                    const difFinalB = item.diferenca_final_b !== undefined ? item.diferenca_final_b : (item.counted_b - item.expected_b);
                    const transfAtoB = (transf.origem === invA.warehouse) ? transf.quantidade_transferida : 0;
                    const transfBtoA = (transf.origem === invB.warehouse) ? transf.quantidade_transferida : 0;
                    const economia = transf.economia_estimada || 0;

                    csv += `"${item.product_code}","${item.description}","${item.tracking || 'N/A'}","${item.lot_number || '-'}",${item.expected_a || 0},${item.counted_a || 0},${item.divergence_a || 0},${transfAtoB},${saldoAjustadoA},${difFinalA},${item.expected_b || 0},${item.counted_b || 0},${item.divergence_b || 0},${transfBtoA},${saldoAjustadoB},${difFinalB},${economia.toFixed(2)}\n`;
                });
            }

            // Download
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            const fileName = `comparacao_${type}_${new Date().toISOString().split('T')[0]}.csv`;

            link.setAttribute('href', url);
            link.setAttribute('download', fileName);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
